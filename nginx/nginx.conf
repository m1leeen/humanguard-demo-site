events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    upstream humanguard_api {
        server host.docker.internal:8080;
    }

    server {
        listen 80;
        server_name localhost;
        
        root /usr/share/nginx/html;
        index index.html;
        
        location /api/ {
            proxy_pass http://humanguard_api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Site-ID "6ee9b2f5-1c18-43c2-ba0b-67b8e4b51ba2";
            
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Site-ID" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
        
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        location /collector.js {
            add_header Cache-Control "no-cache";
        }
    }
}