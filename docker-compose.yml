# protected_site/docker-compose.yml
version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: protected-site
    ports:
      - "3000:80"                   
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    restart: unless-stopped